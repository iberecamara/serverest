name: Cypress Tests for ServeRest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npm run test

      # Generate the single-file Allure report right after tests finish
      - name: Generate single file Allure Report
        if: always()
        run: npm run report:export

      # Upload the report folder so the deployment job can access it
      - name: Upload Allure Report Folder
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-folder
          path: artifacts/reports/allure/allure-report-single
          retention-days: 30
          overwrite: true

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Automation Logs
          path: artifacts/logs/
          retention-days: 30
          overwrite: true

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Automation Screenshots
          path: artifacts/screenshots/
          retention-days: 30
          overwrite: true
          if-no-files-found: ignore

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Automation Videos
          path: artifacts/videos/
          retention-days: 30
          overwrite: true
          if-no-files-found: ignore

  deploy-report:
    needs: test
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Allure Report Folder
        uses: actions/download-artifact@v4
        with:
          name: allure-report-folder
          path: final-report

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: final-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
